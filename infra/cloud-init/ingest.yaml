#cloud-config

# This cloud-init is only used for initial provisioning.
# After first boot, the ingest server is managed via docker compose
# and the deploy workflow (deploy-beta.yml).
#
# The extraction worker IPs are passed to the app container as
# WOOZI_EXTRACTION_SERVICE_URL (comma-separated list).
# The app round-robins requests across all workers.
# When workers are scaled to 0, the app falls back to local
# pymupdf4llm subprocess extraction.

package_update: true

write_files:
  - path: /root/extraction-workers.env
    content: |
      # Auto-generated by OpenTofu. Do not edit manually.
      # Updated when extraction_worker_count changes.
      %{ if length(extraction_worker_ips) > 0 ~}
      WOOZI_EXTRACTION_SERVICE_URL=${join(",", [for ip in extraction_worker_ips : "http://${ip}:8000"])}
      %{ else ~}
      # No extraction workers configured — using local subprocess fallback.
      # WOOZI_EXTRACTION_SERVICE_URL=
      %{ endif ~}
