<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>OpenBesluitvorming Admin</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="content content--admin">
        <section class="section">
          <a class="admin-back-link" href="/">← Terug naar zoeken</a>
          <div class="section__heading">
            <h2>Admin</h2>
          </div>
        </section>

        <section class="section">
          <div class="section__heading">
            <h2>Import starten</h2>
          </div>
          <form id="import-form" class="admin-form admin-form--rerun">
            <div class="admin-source-picker">
              <label class="search-field admin-field admin-field--source-picker">
                <span class="sr-only">Bron zoeken</span>
                <input
                  id="import-source-query"
                  type="search"
                  autocomplete="off"
                  placeholder="Zoek bron, leverancier of bestuurslaag..."
                />
                <input id="import-source-ref" name="sourceRef" type="hidden" />
              </label>
              <div class="admin-source-results" id="import-source-results" hidden></div>
            </div>
            <label class="search-field admin-field">
              <input id="import-date-from" name="dateFrom" type="date" />
            </label>
            <label class="search-field admin-field">
              <input id="import-date-to" name="dateTo" type="date" />
            </label>
            <button type="submit" class="primary-button">Import uitvoeren</button>
          </form>
          <p id="import-status" class="admin-status"></p>
        </section>

        <section class="section">
          <div class="section__heading admin-section-heading">
            <h2>Recente imports</h2>
          </div>
          <div class="admin-form admin-form--filters">
            <label class="select-field select-field--compact">
              <span class="sr-only">Filter bron</span>
              <select id="filter-source">
                <option value="">Alle bronnen</option>
              </select>
            </label>
            <label class="select-field select-field--compact">
              <span class="sr-only">Filter status</span>
              <select id="filter-status">
                <option value="">Alle statussen</option>
                <option value="running">Draait</option>
                <option value="succeeded">Geslaagd</option>
                <option value="partial">Gedeeltelijk</option>
                <option value="failed">Mislukt</option>
              </select>
            </label>
            <button type="button" class="ghost-button" id="refresh-runs">Verversen</button>
          </div>
          <div class="admin-runs-table" aria-hidden="true">
            <div>Import</div>
            <div>Verg.</div>
            <div>Doc.</div>
            <div>Cache</div>
            <div>Download</div>
            <div>Tijd</div>
          </div>
          <div class="admin-runs" id="runs-list"></div>
        </section>
      </main>
    </div>

    <section class="detail-overlay" id="admin-detail-overlay" hidden>
      <div class="detail-overlay__backdrop" data-role="close-admin-detail"></div>
      <article
        class="detail-sheet admin-detail-sheet"
        aria-modal="true"
        aria-labelledby="admin-detail-title"
        role="dialog"
      >
        <div class="detail-sheet__header">
          <div class="detail-sheet__meta">
            <span class="pill" data-role="admin-detail-source"></span>
            <span class="pill pill--soft" data-role="admin-detail-status"></span>
            <span class="detail-sheet__date" data-role="admin-detail-period"></span>
          </div>
          <div class="detail-sheet__header-actions">
            <a
              class="ghost-button detail-sheet__download"
              href="/"
              data-role="admin-detail-view-results"
            >
              Bekijk resultaten
            </a>
            <button
              class="primary-button detail-sheet__download"
              type="button"
              data-role="admin-detail-import"
            >
              Import uitvoeren
            </button>
            <button class="detail-sheet__close" type="button" data-role="close-admin-detail">
              Sluiten
            </button>
          </div>
        </div>
        <div class="detail-sheet__body">
          <div class="admin-detail" data-role="admin-detail-body"></div>
        </div>
      </article>
    </section>

    <script type="module" src="/src/admin.ts"></script>
  </body>
</html>
