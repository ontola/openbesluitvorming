services:
  # Only if you need a local S3-compatible storage
  minio:
    profiles: ["local-s3"]
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-woozi}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-woozi-dev-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
  minio-setup:
    profiles: ["local-s3"]
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-woozi}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-woozi-dev-secret}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-woozi}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 1
        done
        /usr/bin/mc mb --ignore-existing local/$$S3_STORAGE_BUCKET_NAME

  # Does the search, needs an S3 bucket and a volume
  quickwit:
    image: quickwit/quickwit:0.8.1
    command:
      - run
      - --config
      - /quickwit/config/quickwit.yaml
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-woozi}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-woozi-dev-secret}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-woozi}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT:-http://minio:9000}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION:-us-east-1}
      QUICKWIT_CLUSTER_ID: ${QUICKWIT_CLUSTER_ID:-woozi-dev}
      QUICKWIT_NODE_ID: ${QUICKWIT_NODE_ID:-quickwit-dev}
      QUICKWIT_INDEX_ROOT_PREFIX: ${QUICKWIT_INDEX_ROOT_PREFIX:-indexes-dev}
    ports:
      - "7280:7280"
    volumes:
      # Thid won't store the document or the main indexes - only some hot cache for speedy results.
      - quickwit-data:/quickwit/qwdata
      - ./quickwit/quickwit.yaml:/quickwit/config/quickwit.yaml:ro

  # Optional: PDF extraction workers (set EXTRACTION_WORKERS=1 to enable)
  extraction:
    profiles: ["extraction"]
    build:
      context: services/extraction
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-woozi}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-woozi-dev-secret}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-woozi}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT:-http://minio:9000}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION:-us-east-1}
    ports:
      - "8321:8000"

  # The Deno web app + GUI — serves search, admin panel, static assets
  openbesluitvorming:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - quickwit
    environment:
      PORT: 8787
      QUICKWIT_URL: http://quickwit:7280
      QUICKWIT_INDEX_ID: ${QUICKWIT_INDEX_ID:-woozi-events-dev}
      WOOZI_KV_PATH: /data/woozi-ops.sqlite3
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-woozi}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-woozi-dev-secret}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-woozi}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-woozi-dev-secret}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-woozi}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT:-http://minio:9000}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION:-us-east-1}
      WOOZI_EXTRACTION_SERVICE_URL: ${WOOZI_EXTRACTION_SERVICE_URL:-}
    ports:
      - "8787:8787"
    volumes:
      - woozi-state:/data

  # Import worker — polls SQLite for queued imports, executes them
  worker:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - quickwit
    command: ["run", "-A", "src/worker.ts"]
    environment:
      QUICKWIT_URL: http://quickwit:7280
      QUICKWIT_INDEX_ID: ${QUICKWIT_INDEX_ID:-woozi-events-dev}
      QUICKWIT_BATCH_SIZE: ${QUICKWIT_BATCH_SIZE:-64}
      WOOZI_KV_PATH: /data/woozi-ops.sqlite3
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-woozi}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-woozi-dev-secret}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-woozi}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-woozi-dev-secret}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME:-woozi}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT:-http://minio:9000}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION:-us-east-1}
      WOOZI_EXTRACTION_SERVICE_URL: ${WOOZI_EXTRACTION_SERVICE_URL:-}
      INGEST_CONCURRENCY: ${INGEST_CONCURRENCY:-4}
      INGEST_MEMORY_PER_JOB_MB: ${INGEST_MEMORY_PER_JOB_MB:-1400}
      INGEST_MIN_FREE_MEMORY_MB: ${INGEST_MIN_FREE_MEMORY_MB:-1024}
      WOOZI_DOCUMENT_CONCURRENCY: ${WOOZI_DOCUMENT_CONCURRENCY:-3}
    volumes:
      - woozi-state:/data

volumes:
  minio-data:
  quickwit-data:
  woozi-state:
