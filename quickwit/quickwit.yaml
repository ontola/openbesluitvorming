version: 0.7
cluster_id: woozi-local
node_id: quickwit-local
listen_address: 0.0.0.0
rest:
  listen_port: 7280
data_dir: /quickwit/qwdata
metastore_uri: s3://${S3_STORAGE_BUCKET_NAME}/indexes#polling_interval=30s
default_index_root_uri: s3://${S3_STORAGE_BUCKET_NAME}/indexes
storage:
  s3:
    endpoint: ${S3_STORAGE_ENDPOINT}
    region: ${S3_STORAGE_REGION}
    force_path_style_access: true
