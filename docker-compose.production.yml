services:
  caddy:
    image: caddy:2
    depends_on:
      - openbesluitvorming
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  quickwit:
    image: quickwit/quickwit:0.8.1
    restart: unless-stopped
    command:
      - run
      - --config
      - /quickwit/config/quickwit.yaml
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION}
      QUICKWIT_CLUSTER_ID: ${QUICKWIT_CLUSTER_ID:-woozi-prod}
      QUICKWIT_NODE_ID: ${QUICKWIT_NODE_ID:-quickwit-prod}
      QUICKWIT_INDEX_ROOT_PREFIX: ${QUICKWIT_INDEX_ROOT_PREFIX:-indexes-prod}
    volumes:
      - quickwit-data:/quickwit/qwdata
      - ./quickwit/quickwit.yaml:/quickwit/config/quickwit.yaml:ro

  openbesluitvorming:
    image: ${OPENBESLUITVORMING_IMAGE:-ghcr.io/openstate/woozi-openbesluitvorming:main}
    pull_policy: always
    depends_on:
      - quickwit
    restart: unless-stopped
    environment:
      DENO_V8_FLAGS: --max-old-space-size=6144
      PORT: 8787
      QUICKWIT_URL: http://quickwit:7280
      QUICKWIT_INDEX_ID: ${QUICKWIT_INDEX_ID:-woozi-events-prod}
      QUICKWIT_BATCH_SIZE: ${QUICKWIT_BATCH_SIZE:-64}
      WOOZI_KV_PATH: /data/woozi-ops.sqlite3
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION}
    expose:
      - "8787"
    volumes:
      - woozi-state:/data

volumes:
  caddy-data:
  caddy-config:
  quickwit-data:
  woozi-state:
