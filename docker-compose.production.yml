services:
  caddy:
    image: caddy:2
    depends_on:
      - openbesluitvorming
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  quickwit:
    image: quickwit/quickwit:0.8.1
    command:
      - run
      - --config
      - /quickwit/config/quickwit.yaml
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION}
    volumes:
      - quickwit-data:/quickwit/qwdata
      - ./quickwit/quickwit.yaml:/quickwit/config/quickwit.yaml:ro

  openbesluitvorming:
    build:
      context: .
      dockerfile: Dockerfile.web
    depends_on:
      - quickwit
    environment:
      PORT: 8787
      QUICKWIT_URL: http://quickwit:7280
      WOOZI_KV_PATH: /data/woozi-ops.sqlite3
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_STORAGE_BUCKET_NAME: ${S3_STORAGE_BUCKET_NAME}
      S3_STORAGE_ENDPOINT: ${S3_STORAGE_ENDPOINT}
      S3_STORAGE_REGION: ${S3_STORAGE_REGION}
    expose:
      - "8787"
    volumes:
      - woozi-state:/data

volumes:
  caddy-data:
  caddy-config:
  quickwit-data:
  woozi-state:
